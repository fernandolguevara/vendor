name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:

  update-packages:
    runs-on: macos-latest
    strategy:
      fail-fast: true
    steps:
      - uses: actions/checkout@v3

      - name: prepare
        run: |
          brew install ruby

      - name: package
        run: |
          ruby package.rb

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: temp/*.c3l

  discover-targets:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.discover.outputs.targets }}
    steps:
      - uses: actions/checkout@v4

      - id: discover
        name: discover manifest targets
        shell: bash
        run: |
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          def parse_manifest_targets(path: Path) -> set[str]:
            text = path.read_text(encoding="utf-8")
            key = '"targets"'
            start = text.find(key)
            if start == -1:
              return set()

            brace_start = text.find('{', start)
            if brace_start == -1:
              return set()

            i = brace_start
            depth = 0
            in_string = False
            escaped = False
            while i < len(text):
              ch = text[i]
              if in_string:
                if escaped:
                  escaped = False
                elif ch == '\\':
                  escaped = True
                elif ch == '"':
                  in_string = False
              else:
                if ch == '"':
                  in_string = True
                elif ch == '{':
                  depth += 1
                elif ch == '}':
                  depth -= 1
                  if depth == 0:
                    block = text[brace_start:i + 1]
                    break
              i += 1
            else:
              return set()

            keys = set()
            i = 1
            depth = 1
            in_string = False
            escaped = False
            while i < len(block) and depth > 0:
              ch = block[i]
              if in_string:
                if escaped:
                  escaped = False
                elif ch == '\\':
                  escaped = True
                elif ch == '"':
                  in_string = False
              else:
                if ch == '"' and depth == 1:
                  j = i + 1
                  token = []
                  esc = False
                  while j < len(block):
                    c = block[j]
                    if esc:
                      token.append(c)
                      esc = False
                    elif c == '\\':
                      esc = True
                    elif c == '"':
                      break
                    else:
                      token.append(c)
                    j += 1
                  k = j + 1
                  while k < len(block) and block[k].isspace():
                    k += 1
                  if k < len(block) and block[k] == ':':
                    keys.add(''.join(token))
                  i = j
                elif ch == '"':
                  in_string = True
                elif ch == '{':
                  depth += 1
                elif ch == '}':
                  depth -= 1
              i += 1

            return keys

          targets = set()
          for manifest in Path("libraries").glob("*.c3l/manifest.json"):
            targets.update(parse_manifest_targets(manifest))

          excluded_targets = {
            "freebsd-x64",
            "freebsd-x86",
            "linux-x86",
            "openbsd-x86",
          }
          targets -= excluded_targets

          result = json.dumps(sorted(targets))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            output.write(f"targets={result}\n")
          print(result)
          PY

  prepare-c3c:
    runs-on: ubuntu-latest
    steps:
      - id: c3meta
        name: resolve c3c release metadata
        shell: bash
        run: |
          set -euo pipefail
          CANDIDATES=(
            "https://github.com/c3lang/c3c/releases/latest/download/c3-ubuntu-22.tar.gz"
            "https://github.com/c3lang/c3c/releases/latest/download/c3-linux.tar.gz"
          )

          ARCHIVE_URL=""
          for url in "${CANDIDATES[@]}"; do
            if curl -fsSLI "$url" >/dev/null; then
              ARCHIVE_URL="$url"
              break
            fi
          done

          if [ -z "$ARCHIVE_URL" ]; then
            echo "Unable to resolve a downloadable C3 compiler archive." >&2
            exit 1
          fi

          VERSION="$(ARCHIVE_URL="$ARCHIVE_URL" python3 <<'PY'
          import os
          import re
          import subprocess

          output = subprocess.check_output(["curl", "-fsSLI", os.environ["ARCHIVE_URL"]], text=True)
          match = re.search(r"/releases/download/([^/]+)/", output)
          print(match.group(1) if match else "latest")
          PY
          )"

          echo "archive_url=$ARCHIVE_URL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - id: c3cache
        name: cache c3c archive
        uses: actions/cache@v4
        with:
          path: .c3c
          key: c3c-${{ runner.os }}-${{ steps.c3meta.outputs.version }}
          restore-keys: |
            c3c-${{ runner.os }}-

      - name: download and extract c3c
        if: steps.c3cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .c3c
          mkdir -p .c3c
          curl -fsSL -o c3-archive.tar.gz "${{ steps.c3meta.outputs.archive_url }}"
          tar -xzf c3-archive.tar.gz -C .c3c

      - name: upload c3c artifact
        uses: actions/upload-artifact@v4
        with:
          name: c3c
          path: .c3c
          include-hidden-files: true

  compile-vendor-libs:
    runs-on: ubuntu-latest
    needs: [discover-targets, prepare-c3c]
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover-targets.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4

      - name: download c3c artifact
        uses: actions/download-artifact@v4
        with:
          name: c3c
          path: .c3c

      - name: add c3c to PATH
        shell: bash
        run: |
          set -euo pipefail

          C3C_BIN="$(python3 <<'PY'
          from pathlib import Path
          bins = [p for p in Path('.c3c').rglob('c3c') if p.is_file()]
          if not bins:
              raise SystemExit(1)
          print(bins[0].resolve())
          PY
          )"

          chmod +x "$C3C_BIN"
          C3C_DIR="$(dirname "$C3C_BIN")"
          echo "$C3C_DIR" >> "$GITHUB_PATH"
          PATH="$C3C_DIR:$PATH" c3c --version

      - name: compile libraries for target
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          python3 <<'PY'
          import os
          import subprocess
          import sys
          from pathlib import Path

          def parse_manifest_targets(path: Path) -> set[str]:
            text = path.read_text(encoding="utf-8")
            key = '"targets"'
            start = text.find(key)
            if start == -1:
              return set()

            brace_start = text.find('{', start)
            if brace_start == -1:
              return set()

            i = brace_start
            depth = 0
            in_string = False
            escaped = False
            while i < len(text):
              ch = text[i]
              if in_string:
                if escaped:
                  escaped = False
                elif ch == '\\':
                  escaped = True
                elif ch == '"':
                  in_string = False
              else:
                if ch == '"':
                  in_string = True
                elif ch == '{':
                  depth += 1
                elif ch == '}':
                  depth -= 1
                  if depth == 0:
                    block = text[brace_start:i + 1]
                    break
              i += 1
            else:
              return set()

            keys = set()
            i = 1
            depth = 1
            in_string = False
            escaped = False
            while i < len(block) and depth > 0:
              ch = block[i]
              if in_string:
                if escaped:
                  escaped = False
                elif ch == '\\':
                  escaped = True
                elif ch == '"':
                  in_string = False
              else:
                if ch == '"' and depth == 1:
                  j = i + 1
                  token = []
                  esc = False
                  while j < len(block):
                    c = block[j]
                    if esc:
                      token.append(c)
                      esc = False
                    elif c == '\\':
                      esc = True
                    elif c == '"':
                      break
                    else:
                      token.append(c)
                    j += 1
                  k = j + 1
                  while k < len(block) and block[k].isspace():
                    k += 1
                  if k < len(block) and block[k] == ':':
                    keys.add(''.join(token))
                  i = j
                elif ch == '"':
                  in_string = True
                elif ch == '{':
                  depth += 1
                elif ch == '}':
                  depth -= 1
              i += 1

            return keys

          target = os.environ["TARGET"]
          manifests = sorted(Path("libraries").glob("*.c3l/manifest.json"))
          matched = 0

          for manifest in manifests:
            if target not in parse_manifest_targets(manifest):
              continue

            libdir = manifest.parent
            libname = libdir.name[:-4] if libdir.name.endswith(".c3l") else libdir.name
            files = sorted(libdir.glob("*.c3")) + sorted(libdir.glob("*.c3i"))
            srcdir = libdir / "src"
            if srcdir.exists():
              files += sorted(srcdir.glob("*.c3"))
              files += sorted(srcdir.glob("*.c3i"))

            if not files:
              print(f"Library '{libname}' declares target '{target}' but has no .c3/.c3i files", file=sys.stderr)
              sys.exit(1)

            matched += 1
            print(f"Compiling {libname} for {target}")
            command = [
              "c3c", "-C", "compile",
              "--target", target,
              "--libdir", "./libraries",
              "--lib", libname,
              *[str(path.resolve()) for path in files],
            ]
            subprocess.run(command, check=True)

          if matched == 0:
            print(f"No libraries declare target '{target}', skipping")
          PY

  release:
    runs-on: ubuntu-latest
    needs: [update-packages, compile-vendor-libs]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: packages

      - name: delete existing latest release and tag
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true

      - name: create latest release and upload all packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest packages/*.c3l \
            --target "${GITHUB_SHA}" \
            --title "Latest" \
            --notes "Automated vendor package release for ${GITHUB_SHA}."
